services:
  mongo:
    image: mongo:8
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch(e) { rs.initiate().ok }"]
      interval: 5s
      timeout: 5s
      retries: 20
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/?replicaSet=rs0&directConnection=true
    depends_on:
      mongo: { condition: service_healthy }
volumes: { mongo_data: {} }
